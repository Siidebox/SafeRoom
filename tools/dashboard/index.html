<!doctype html>
<html lang="en" class="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SafeRoom</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:wght@500;700&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
            serif: ['Lora', 'Georgia', 'serif'],
          },
          colors: {
            ink: { 950: '#0B1220', 900: '#111827', 800: '#1F2937', 700: '#374151' },
            ok:    '#10B981',
            warn:  '#F59E0B',
            alert: '#DC2626',
            brand: '#0891B2',
          },
        },
      },
    };
  </script>
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
    h1, h2 { font-family: 'Lora', Georgia, serif; }
    .pulse-alert { animation: pulseAlert 1.2s ease-in-out infinite; }
    @keyframes pulseAlert {
      0%, 100% { box-shadow: 0 0 0 0 rgba(220,38,38,0.55); }
      50%      { box-shadow: 0 0 0 14px rgba(220,38,38,0); }
    }
    @media (prefers-reduced-motion: reduce) {
      .pulse-alert { animation: none; }
    }
    canvas { image-rendering: pixelated; }
  </style>
</head>
<body class="bg-ink-950 text-slate-200 min-h-screen">

  <div class="max-w-4xl mx-auto px-5 py-6">

    <header class="flex items-center justify-between mb-8">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-lg bg-brand/20 grid place-items-center">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 text-brand" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12 L12 3 L21 12"/><path d="M5 10 V20 H19 V10"/><circle cx="12" cy="15" r="2.2"/></svg>
        </div>
        <div>
          <h1 class="text-2xl font-bold leading-none">SafeRoom</h1>
          <p class="text-xs text-slate-500 mt-1" data-i18n="subtitle">Privacy-preserving monitoring</p>
        </div>
      </div>
      <div class="flex items-center gap-2">
        <button id="lang-btn" class="px-3 py-1.5 rounded-md text-sm bg-ink-800 hover:bg-ink-700 transition-colors cursor-pointer" title="Language">EN</button>
        <button id="theme-btn" class="px-3 py-1.5 rounded-md text-sm bg-ink-800 hover:bg-ink-700 transition-colors cursor-pointer" title="Theme">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
      </div>
    </header>

    <!-- Main status card -->
    <section id="status-card" class="rounded-2xl border border-ink-800 bg-ink-900/60 backdrop-blur p-8 mb-6 transition-colors">
      <div class="flex items-center gap-5">
        <div id="status-dot" class="w-5 h-5 rounded-full bg-slate-600 shrink-0"></div>
        <div class="flex-1 min-w-0">
          <h2 id="status-title" class="text-3xl font-semibold text-slate-100" data-i18n="status_unknown">Connecting…</h2>
          <p id="status-sub" class="text-sm text-slate-400 mt-1" data-i18n="status_waiting">Waiting for sensor data</p>
        </div>
        <button id="ack-btn" class="hidden px-4 py-2 rounded-lg bg-alert text-white font-medium hover:bg-red-700 transition-colors cursor-pointer" data-i18n="acknowledge">Acknowledge</button>
      </div>
    </section>

    <!-- Sensor health row -->
    <section class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-6">
      <div class="rounded-xl border border-ink-800 bg-ink-900/40 p-4">
        <div class="flex items-center justify-between mb-2">
          <span class="text-xs uppercase tracking-wide text-slate-500" data-i18n="radar">Radar</span>
          <span id="radar-dot" class="w-2.5 h-2.5 rounded-full bg-slate-600"></span>
        </div>
        <div class="text-lg font-semibold text-slate-100"><span id="radar-fps">--</span> <span class="text-xs text-slate-500">fps</span></div>
        <div class="text-xs text-slate-500 mt-1" id="radar-status" data-i18n="offline">offline</div>
      </div>
      <div class="rounded-xl border border-ink-800 bg-ink-900/40 p-4">
        <div class="flex items-center justify-between mb-2">
          <span class="text-xs uppercase tracking-wide text-slate-500" data-i18n="thermal">Thermal</span>
          <span id="mlx-dot" class="w-2.5 h-2.5 rounded-full bg-slate-600"></span>
        </div>
        <div class="text-lg font-semibold text-slate-100"><span id="mlx-fps">--</span> <span class="text-xs text-slate-500">fps</span></div>
        <div class="text-xs text-slate-500 mt-1" id="mlx-status" data-i18n="offline">offline</div>
      </div>
      <div class="rounded-xl border border-ink-800 bg-ink-900/40 p-4">
        <div class="flex items-center justify-between mb-2">
          <span class="text-xs uppercase tracking-wide text-slate-500" data-i18n="connection">Connection</span>
          <span id="net-dot" class="w-2.5 h-2.5 rounded-full bg-slate-600"></span>
        </div>
        <div class="text-lg font-semibold text-slate-100" id="net-latency">-- <span class="text-xs text-slate-500">ms</span></div>
        <div class="text-xs text-slate-500 mt-1" id="net-status" data-i18n="connecting">connecting</div>
      </div>
    </section>

    <!-- Thermal mini-view + Activity -->
    <section class="grid grid-cols-1 lg:grid-cols-3 gap-4">
      <div class="lg:col-span-1 rounded-xl border border-ink-800 bg-ink-900/40 p-4">
        <div class="flex items-center justify-between mb-3">
          <h3 class="text-sm font-semibold text-slate-300" data-i18n="thermal_live">Live thermal</h3>
          <span id="thermal-range" class="text-xs text-slate-500"></span>
        </div>
        <canvas id="thermal-canvas" width="32" height="24" class="w-full h-auto rounded bg-ink-950" aria-label="Live thermal image"></canvas>
        <p class="text-xs text-slate-500 mt-2" data-i18n="thermal_note">32 × 24 IR array, bilinear-rendered</p>
      </div>

      <div class="lg:col-span-2 rounded-xl border border-ink-800 bg-ink-900/40 p-4">
        <h3 class="text-sm font-semibold text-slate-300 mb-3" data-i18n="recent_activity">Recent activity</h3>
        <ul id="event-list" class="divide-y divide-ink-800"></ul>
        <p id="event-empty" class="text-sm text-slate-500 italic py-6 text-center" data-i18n="no_events">No events recorded yet.</p>
      </div>
    </section>

    <footer class="text-center text-xs text-slate-600 mt-10">
      SafeRoom · TFM · <a href="https://github.com/Siidebox/SafeRoom" class="text-brand hover:underline">github</a>
    </footer>
  </div>

  <script>
    // ============ i18n ============
    const I18N = {
      en: {
        subtitle: 'Privacy-preserving monitoring',
        status_ok: 'All clear',
        status_ok_sub: 'Presence detected',
        status_no_presence: 'No presence',
        status_no_presence_sub: 'Room appears empty',
        status_alert_fall_fast: 'FALL DETECTED',
        status_alert_faint: 'IMMOBILITY ALERT',
        status_alert_sub: 'Tap acknowledge once attended',
        status_unknown: 'Connecting…',
        status_waiting: 'Waiting for sensor data',
        acknowledge: 'Acknowledge',
        radar: 'Radar', thermal: 'Thermal', connection: 'Connection',
        online: 'online', offline: 'offline', connecting: 'connecting',
        thermal_live: 'Live thermal',
        thermal_note: '32 × 24 IR array, bilinear-rendered',
        thermal_waiting: 'Waiting for first frame…',
        recent_activity: 'Recent activity',
        no_events: 'No events recorded yet.',
        ev_presence: 'Presence detected',
        ev_presence_lost: 'Presence lost',
        ev_no_motion: 'No motion',
        ev_fall_fast: 'Fall detected',
        ev_faint: 'Possible faint',
        ev_heartbeat: 'Heartbeat',
        just_now: 'just now', sec_ago: 's ago', min_ago: 'min ago', hr_ago: 'h ago',
      },
      es: {
        subtitle: 'Monitorización con preservación de privacidad',
        status_ok: 'Todo en orden',
        status_ok_sub: 'Presencia detectada',
        status_no_presence: 'Sin presencia',
        status_no_presence_sub: 'La sala parece vacía',
        status_alert_fall_fast: 'CAÍDA DETECTADA',
        status_alert_faint: 'ALERTA DE INMOVILIDAD',
        status_alert_sub: 'Pulsa confirmar al atender',
        status_unknown: 'Conectando…',
        status_waiting: 'Esperando datos del sensor',
        acknowledge: 'Confirmar',
        radar: 'Radar', thermal: 'Térmica', connection: 'Conexión',
        online: 'en línea', offline: 'desconectado', connecting: 'conectando',
        thermal_live: 'Térmica en vivo',
        thermal_note: 'Array IR 32 × 24, render bilinear',
        thermal_waiting: 'Esperando primer frame…',
        recent_activity: 'Actividad reciente',
        no_events: 'Sin eventos registrados aún.',
        ev_presence: 'Presencia detectada',
        ev_presence_lost: 'Presencia perdida',
        ev_no_motion: 'Sin movimiento',
        ev_fall_fast: 'Caída detectada',
        ev_faint: 'Posible desmayo',
        ev_heartbeat: 'Latido',
        just_now: 'ahora mismo', sec_ago: 's', min_ago: 'min', hr_ago: 'h',
      },
    };
    let lang = localStorage.getItem('lang') || 'en';
    function t(k) { return I18N[lang][k] ?? k; }
    function applyI18n() {
      document.documentElement.lang = lang;
      document.querySelectorAll('[data-i18n]').forEach(el => {
        el.textContent = t(el.dataset.i18n);
      });
      document.getElementById('lang-btn').textContent = lang.toUpperCase();
      render();
    }
    document.getElementById('lang-btn').addEventListener('click', () => {
      lang = lang === 'en' ? 'es' : 'en';
      localStorage.setItem('lang', lang);
      applyI18n();
    });

    // ============ Theme ============
    if (localStorage.getItem('theme') === 'light') document.documentElement.classList.remove('dark');
    document.getElementById('theme-btn').addEventListener('click', () => {
      const isDark = document.documentElement.classList.toggle('dark');
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
    });

    // ============ State ============
    let lastState = null;
    let recentEvents = [];

    // ============ Notifications ============
    if ('Notification' in window && Notification.permission === 'default') {
      Notification.requestPermission();
    }
    function notifyBrowser(type, detailsText) {
      if (Notification.permission !== 'granted') return;
      const titleKey = type === 'fall_fast' ? 'status_alert_fall_fast'
                     : type === 'faint'     ? 'status_alert_faint'
                     :                        `ev_${type}`;
      new Notification(t(titleKey), {
        body: detailsText || '', icon: '/static/icon.png',
        tag: 'saferoom', requireInteraction: type === 'fall_fast' || type === 'faint',
      });
    }

    // ============ Rendering ============
    function fmtAgo(ts) {
      const diff = Math.max(0, (Date.now() / 1000) - ts);
      if (diff < 5)  return t('just_now');
      if (diff < 60) return `${Math.floor(diff)} ${t('sec_ago')}`;
      if (diff < 3600) return `${Math.floor(diff / 60)} ${t('min_ago')}`;
      return `${Math.floor(diff / 3600)} ${t('hr_ago')}`;
    }
    function fmtTime(ts) {
      const d = new Date(ts * 1000);
      return d.toLocaleTimeString(lang === 'en' ? 'en-GB' : 'es-ES', { hour: '2-digit', minute: '2-digit' });
    }

    function renderStatus(s) {
      const card = document.getElementById('status-card');
      const dot = document.getElementById('status-dot');
      const title = document.getElementById('status-title');
      const sub = document.getElementById('status-sub');
      const ackBtn = document.getElementById('ack-btn');

      card.classList.remove('pulse-alert', 'border-alert', 'border-ok', 'border-ink-800');
      ackBtn.classList.add('hidden');

      if (s.active_alert) {
        const a = s.active_alert;
        const key = a.type === 'fall_fast' ? 'status_alert_fall_fast' : 'status_alert_faint';
        title.textContent = t(key);
        sub.textContent = t('status_alert_sub');
        dot.className = 'w-5 h-5 rounded-full bg-alert shrink-0';
        card.classList.add('pulse-alert', 'border-alert');
        ackBtn.classList.remove('hidden');
      } else if (s.presence) {
        title.textContent = t('status_ok');
        sub.textContent = `${t('status_ok_sub')} · ${fmtAgo(s.last_presence_change)}`;
        dot.className = 'w-5 h-5 rounded-full bg-ok shrink-0';
        card.classList.add('border-ok');
      } else {
        title.textContent = t('status_no_presence');
        sub.textContent = t('status_no_presence_sub');
        dot.className = 'w-5 h-5 rounded-full bg-slate-500 shrink-0';
        card.classList.add('border-ink-800');
      }
    }

    function renderSensors(s) {
      const setPill = (idDot, idStatus, online) => {
        document.getElementById(idDot).className =
          'w-2.5 h-2.5 rounded-full ' + (online ? 'bg-ok' : 'bg-slate-600');
        document.getElementById(idStatus).textContent = t(online ? 'online' : 'offline');
      };
      setPill('radar-dot', 'radar-status', s.radar.online);
      setPill('mlx-dot',   'mlx-status',   s.mlx.online);
      document.getElementById('radar-fps').textContent = s.radar.fps?.toFixed?.(1) ?? s.radar.fps;
      document.getElementById('mlx-fps').textContent   = s.mlx.fps?.toFixed?.(1)   ?? s.mlx.fps;
      // Connection pill driven by SSE liveness (handled in onopen/onerror below)
    }

    function renderThermal(thermal) {
      const canvas = document.getElementById('thermal-canvas');
      const range = document.getElementById('thermal-range');
      if (!thermal || !thermal.pixels) {
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#0B1220';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        range.textContent = '';
        return;
      }
      canvas.width = thermal.width;
      canvas.height = thermal.height;
      const ctx = canvas.getContext('2d');
      const img = ctx.createImageData(thermal.width, thermal.height);
      const valid = thermal.pixels.filter(v => v != null && !Number.isNaN(v));
      if (valid.length === 0) return;
      const lo = valid.reduce((a,b)=>Math.min(a,b), Infinity);
      const hi = valid.reduce((a,b)=>Math.max(a,b), -Infinity);
      const span = Math.max(1, hi - lo);
      // Inferno colormap approximation (5 stops)
      const stops = [
        [0,   0,   4],
        [87,  16, 110],
        [187, 55, 84],
        [249,142, 9],
        [252,254,164],
      ];
      function lerp(a, b, t) { return a + (b - a) * t; }
      function colormap(v) {
        const x = (v - lo) / span * (stops.length - 1);
        const i = Math.max(0, Math.min(stops.length - 2, Math.floor(x)));
        const f = x - i;
        return [
          lerp(stops[i][0], stops[i+1][0], f),
          lerp(stops[i][1], stops[i+1][1], f),
          lerp(stops[i][2], stops[i+1][2], f),
        ];
      }
      for (let i = 0; i < thermal.pixels.length; i++) {
        const v = thermal.pixels[i];
        const [r, g, b] = (v == null || Number.isNaN(v)) ? [11, 18, 32] : colormap(v);
        img.data[i*4]   = r;
        img.data[i*4+1] = g;
        img.data[i*4+2] = b;
        img.data[i*4+3] = 255;
      }
      ctx.putImageData(img, 0, 0);
      range.textContent = `${lo.toFixed(1)} – ${hi.toFixed(1)} °C`;
    }

    function renderEvents() {
      const list = document.getElementById('event-list');
      const empty = document.getElementById('event-empty');
      if (recentEvents.length === 0) {
        list.innerHTML = '';
        empty.classList.remove('hidden');
        return;
      }
      empty.classList.add('hidden');
      const colorOf = (type) =>
        type === 'fall_fast' ? 'text-alert' :
        type === 'faint'     ? 'text-warn' :
        type === 'presence'  ? 'text-ok' :
        type === 'no_motion' ? 'text-warn' :
                               'text-slate-400';
      list.innerHTML = recentEvents.slice(0, 30).map(ev => `
        <li class="py-2.5 flex items-center gap-3">
          <span class="w-1.5 h-1.5 rounded-full ${colorOf(ev.type).replace('text-','bg-')}"></span>
          <span class="text-sm ${colorOf(ev.type)} font-medium">${t('ev_' + ev.type)}</span>
          <span class="ml-auto text-xs text-slate-500 tabular-nums">${fmtTime(ev.ts)}</span>
        </li>
      `).join('');
    }

    function render() {
      if (!lastState) return;
      renderStatus(lastState);
      renderSensors(lastState);
      renderThermal(lastState.thermal);
      renderEvents();
    }

    // ============ Acknowledge ============
    document.getElementById('ack-btn').addEventListener('click', async () => {
      await fetch('/ack_alert', { method: 'POST' });
    });

    // ============ SSE ============
    let es;
    function connectStream() {
      es = new EventSource('/stream');
      const netDot = document.getElementById('net-dot');
      const netStatus = document.getElementById('net-status');
      const netLatency = document.getElementById('net-latency');
      es.onopen = () => {
        netDot.className = 'w-2.5 h-2.5 rounded-full bg-ok';
        netStatus.textContent = t('online');
      };
      es.onerror = () => {
        netDot.className = 'w-2.5 h-2.5 rounded-full bg-alert';
        netStatus.textContent = t('offline');
      };
      es.onmessage = (ev) => {
        if (!ev.data || ev.data.startsWith(':')) return;
        let msg; try { msg = JSON.parse(ev.data); } catch { return; }
        if (msg.state) lastState = msg.state;
        if (msg.kind === 'event' && msg.event) {
          recentEvents.unshift({ ts: msg.event.timestamp, type: msg.event.type, details: msg.event.details });
          if (['fall_fast', 'faint'].includes(msg.event.type)) {
            notifyBrowser(msg.event.type, JSON.stringify(msg.event.details));
          }
        }
        netLatency.innerHTML = `${Math.round((Date.now()/1000 - (lastState?.now ?? Date.now()/1000)) * 1000)} <span class="text-xs text-slate-500">ms</span>`;
        render();
      };
    }

    // ============ Bootstrap ============
    async function bootstrap() {
      try {
        const [stRes, evRes] = await Promise.all([fetch('/state'), fetch('/events?limit=30')]);
        lastState = await stRes.json();
        recentEvents = (await evRes.json()).map(e => ({ ts: e.ts, type: e.type, details: e.details }));
      } catch (e) { console.error('bootstrap', e); }
      applyI18n();
      connectStream();
      setInterval(render, 5000); // keep timestamps fresh
    }
    bootstrap();
  </script>
</body>
</html>
